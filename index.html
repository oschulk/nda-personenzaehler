<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="color-scheme" content="light">
  <title>Aurubis Lünen – Personenzähler</title>
  <style>
    :root{
      --bg:#f4f8fb;
      --card:#ffffff;
      --text:#102333;
      --muted:#6b7a86;
      --line:#dbe6ee;
      --aurubis:#008fc7;
      --aurubis-dark:#006b9a;
      --male:#1976d2;
      --female:#c83f8d;
      --good:#0f9f6e;
      --warn:#f2a900;
      --danger:#d64545;
      --shadow:0 14px 34px rgba(16,35,51,.08);
      --radius:24px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,#fff 0%,var(--bg) 100%);
    }
    button{font:inherit}
    .app{max-width:1120px;margin:0 auto;padding:18px;min-height:100%;display:grid;gap:16px;grid-template-rows:auto 1fr auto}
    header{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 18px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
    .brand{display:flex;align-items:center;gap:13px;min-width:0}
    .logo{width:48px;height:48px;border-radius:15px;background:linear-gradient(135deg,var(--aurubis),#42c7ec);display:grid;place-items:center;color:white;font-weight:1000;font-size:23px;flex:0 0 auto}
    h1{margin:0;font-size:clamp(1.3rem,2.2vw,2rem);letter-spacing:-.035em;line-height:1.05}
    .sub{color:var(--muted);font-size:.94rem;margin-top:3px}
    .status{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .chip{display:inline-flex;align-items:center;gap:8px;min-height:40px;padding:8px 12px;border-radius:999px;background:#f8fbfd;border:1px solid var(--line);font-weight:900;font-size:.9rem;white-space:nowrap}
    .dot{width:10px;height:10px;border-radius:50%;background:var(--warn)}
    .dot.online{background:var(--good)}.dot.offline{background:var(--danger)}.dot.pending{background:var(--warn)}
    .iconBtn{width:42px;height:42px;border-radius:14px;border:1px solid var(--line);background:white;color:var(--text);cursor:pointer;display:grid;place-items:center;font-weight:1000}
    .iconBtn:active,.btn:active,.miniBtn:active{transform:scale(.985)}
    main{display:grid;grid-template-columns:1fr 330px;gap:16px;align-items:start}
    .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
    .counter{padding:26px;display:grid;gap:20px}
    .totalBox{text-align:center;padding:18px 10px 8px}
    .label{color:var(--muted);font-weight:900;letter-spacing:.04em;text-transform:uppercase;font-size:.8rem}
    .total{margin-top:8px;color:var(--aurubis-dark);font-size:clamp(6rem,15vw,11rem);line-height:.85;font-weight:1000;letter-spacing:-.08em}
    .quickStats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .stat{border:1px solid var(--line);border-radius:18px;padding:14px;background:#fbfdfe}
    .statName{color:var(--muted);font-size:.85rem;font-weight:900}.statValue{margin-top:6px;font-size:2rem;line-height:1;font-weight:1000;letter-spacing:-.04em}
    .buttons{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
    .btn{min-height:145px;border:0;border-radius:22px;color:white;cursor:pointer;display:flex;align-items:center;justify-content:space-between;padding:22px;box-shadow:0 12px 26px rgba(16,35,51,.13);transition:filter .1s ease}
    .btn:hover{filter:saturate(1.06)}.btn strong{display:block;font-size:1.42rem;letter-spacing:-.03em;line-height:1.05}.btn span{font-size:3rem;font-weight:1000;line-height:1}
    .male{background:linear-gradient(135deg,#2894e8,var(--male))}.female{background:linear-gradient(135deg,#dd6eaa,var(--female))}.out{opacity:.82}
    aside{display:grid;gap:16px}.side{padding:17px;display:grid;gap:13px}.sideGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.sideStat{padding:14px;border:1px solid var(--line);border-radius:16px;background:#fbfdfe}.sideStat span{color:var(--muted);font-weight:800;font-size:.88rem}.sideStat b{display:block;font-size:1.8rem;line-height:1;margin-top:5px;letter-spacing:-.04em}
    .actions{display:grid;gap:10px}.miniBtn{min-height:48px;border-radius:15px;border:1px solid var(--line);background:white;color:var(--text);font-weight:900;cursor:pointer}.miniBtn.primary{background:var(--aurubis);border-color:var(--aurubis);color:white}.miniBtn.danger{color:var(--danger)}
    .feed{display:grid;gap:8px;max-height:275px;overflow:auto}.feedItem{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);font-size:.94rem}.feedItem:last-child{border-bottom:0}.feedItem b{font-weight:900}.feedItem time{color:var(--muted);font-weight:800;white-space:nowrap}
    footer{display:flex;justify-content:space-between;align-items:center;gap:12px;color:var(--muted);font-size:.9rem;padding:0 4px 6px}
    .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(14px);opacity:0;pointer-events:none;padding:12px 16px;border-radius:15px;background:#102333;color:white;font-weight:900;box-shadow:var(--shadow);transition:.16s ease}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @media(max-width:900px){.app{padding:14px}header{align-items:flex-start;flex-direction:column}.status{justify-content:flex-start}main{grid-template-columns:1fr}.buttons{grid-template-columns:1fr 1fr}}
    @media(max-width:620px){.counter{padding:18px}.quickStats,.buttons{grid-template-columns:1fr}.btn{min-height:112px}footer{flex-direction:column;align-items:flex-start}}
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <div class="logo">A</div>
        <div>
          <h1>Aurubis Lünen – Personenzähler</h1>
          <div class="sub">Nacht der Ausbildung</div>
        </div>
      </div>
      <div class="status">
        <div class="chip"><span class="dot pending" id="statusDot"></span><span id="statusText">Verbinde …</span></div>
        <button class="iconBtn" id="fullscreenBtn" type="button" title="Vollbild">⛶</button>
      </div>
    </header>

    <main>
      <section class="panel counter">
        <div class="totalBox">
          <div class="label">Aktuell im Bereich</div>
          <div class="total" id="currentTotal">0</div>
        </div>

        <div class="quickStats">
          <div class="stat"><div class="statName">Männlich</div><div class="statValue" id="maleCurrent">0</div></div>
          <div class="stat"><div class="statName">Weiblich</div><div class="statValue" id="femaleCurrent">0</div></div>
          <div class="stat"><div class="statName">Peak</div><div class="statValue" id="peakValue">0</div></div>
        </div>

        <div class="buttons">
          <button class="btn male" id="btnMaleIn" type="button"><strong>Männlich rein</strong><span>+</span></button>
          <button class="btn male out" id="btnMaleOut" type="button"><strong>Männlich raus</strong><span>−</span></button>
          <button class="btn female" id="btnFemaleIn" type="button"><strong>Weiblich rein</strong><span>+</span></button>
          <button class="btn female out" id="btnFemaleOut" type="button"><strong>Weiblich raus</strong><span>−</span></button>
        </div>
      </section>

      <aside>
        <section class="panel side">
          <div class="sideGrid">
            <div class="sideStat"><span>Gesamt rein</span><b id="totalInValue">0</b></div>
            <div class="sideStat"><span>Gesamt raus</span><b id="totalOutValue">0</b></div>
            <div class="sideStat"><span>Aktionen</span><b id="eventCount">0</b></div>
            <div class="sideStat"><span>Stand</span><b id="liveValue">Live</b></div>
          </div>
          <div class="actions">
            <button class="miniBtn primary" id="refreshBtn" type="button">Neu laden</button>
            <button class="miniBtn" id="backupBtn" type="button">Backup kopieren</button>
            <button class="miniBtn danger" id="resetBtn" type="button">Zurücksetzen</button>
          </div>
        </section>

        <section class="panel side">
          <div class="label">Letzte Aktionen</div>
          <div class="feed" id="activityFeed"></div>
        </section>
      </aside>
    </main>

    <footer>
      <span id="syncInfo">Firebase: verbunden</span>
      <span id="updatedInfo">Aktualisiert: –</span>
    </footer>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
    import { getDatabase, ref, onValue, runTransaction, set, push, query, limitToLast, remove } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCmArIvvc4ikmtJS3POHL0Wq0l5v9kJ1SY",
      authDomain: "nda-personenzaehler.firebaseapp.com",
      databaseURL: "https://nda-personenzaehler-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "nda-personenzaehler",
      storageBucket: "nda-personenzaehler.firebasestorage.app",
      messagingSenderId: "1056682674334",
      appId: "1:1056682674334:web:dc270c8bb1dba8ce51538f",
      measurementId: "G-HK25LZR82X"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const PATH = "nda";
    const counterRef = ref(db, `${PATH}/counter`);
    const feedRef = ref(db, `${PATH}/feed`);
    const connectedRef = ref(db, ".info/connected");

    const DEFAULT_COUNTER = {
      maleIn:0,
      maleOut:0,
      femaleIn:0,
      femaleOut:0,
      peak:0,
      eventCount:0,
      updatedAt:Date.now(),
      lastAction:"Start"
    };

    const $ = (id) => document.getElementById(id);
    const els = {
      currentTotal:$("currentTotal"),
      maleCurrent:$("maleCurrent"),
      femaleCurrent:$("femaleCurrent"),
      peakValue:$("peakValue"),
      totalInValue:$("totalInValue"),
      totalOutValue:$("totalOutValue"),
      eventCount:$("eventCount"),
      liveValue:$("liveValue"),
      statusDot:$("statusDot"),
      statusText:$("statusText"),
      activityFeed:$("activityFeed"),
      syncInfo:$("syncInfo"),
      updatedInfo:$("updatedInfo"),
      toast:$("toast")
    };

    let online = false;
    let latestCounter = {...DEFAULT_COUNTER};
    const deviceId = getDeviceId();

    function getDeviceId(){
      const key = "nda_firebase_device_id";
      let id = localStorage.getItem(key);
      if(!id){
        id = "gerät-" + Math.random().toString(16).slice(2,8);
        localStorage.setItem(key,id);
      }
      return id;
    }

    function n(value){
      const num = Number(value);
      return Number.isFinite(num) ? num : 0;
    }

    function cleanCounter(data){
      return {
        maleIn:n(data?.maleIn),
        maleOut:n(data?.maleOut),
        femaleIn:n(data?.femaleIn),
        femaleOut:n(data?.femaleOut),
        peak:n(data?.peak),
        eventCount:n(data?.eventCount),
        updatedAt:data?.updatedAt || Date.now(),
        lastAction:data?.lastAction || "–"
      };
    }

    function compute(data = latestCounter){
      const maleCurrent = Math.max(0, n(data.maleIn) - n(data.maleOut));
      const femaleCurrent = Math.max(0, n(data.femaleIn) - n(data.femaleOut));
      const totalIn = n(data.maleIn) + n(data.femaleIn);
      const totalOut = n(data.maleOut) + n(data.femaleOut);
      const totalCurrent = maleCurrent + femaleCurrent;
      return {maleCurrent, femaleCurrent, totalIn, totalOut, totalCurrent};
    }

    function formatTime(value){
      if(!value) return "–";
      return new Date(value).toLocaleTimeString("de-DE", {hour:"2-digit", minute:"2-digit", second:"2-digit"});
    }

    function toast(message){
      els.toast.textContent = message;
      els.toast.classList.add("show");
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => els.toast.classList.remove("show"), 1500);
    }

    function renderCounter(data){
      latestCounter = cleanCounter(data);
      const c = compute(latestCounter);
      els.currentTotal.textContent = c.totalCurrent;
      els.maleCurrent.textContent = c.maleCurrent;
      els.femaleCurrent.textContent = c.femaleCurrent;
      els.totalInValue.textContent = c.totalIn;
      els.totalOutValue.textContent = c.totalOut;
      els.peakValue.textContent = latestCounter.peak;
      els.eventCount.textContent = latestCounter.eventCount;
      els.updatedInfo.textContent = `Aktualisiert: ${formatTime(latestCounter.updatedAt)}`;
    }

    function renderStatus(){
      els.statusDot.className = `dot ${online ? "online" : "offline"}`;
      els.statusText.textContent = online ? "Online" : "Offline";
      els.liveValue.textContent = online ? "Live" : "Offline";
      els.syncInfo.textContent = online ? "Firebase: verbunden" : "Firebase: getrennt";
    }

    function renderFeed(items){
      els.activityFeed.innerHTML = "";
      if(!items.length){
        els.activityFeed.innerHTML = '<div class="feedItem"><b>Noch keine Aktion</b><time>–</time></div>';
        return;
      }
      items.slice().reverse().forEach(item => {
        const row = document.createElement("div");
        row.className = "feedItem";
        row.innerHTML = `<b>${escapeHTML(item.title || "Aktion")}</b><time>${formatTime(item.at)}</time>`;
        els.activityFeed.appendChild(row);
      });
    }

    function escapeHTML(value){
      return String(value)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#39;");
    }

    async function addFeed(title){
      try{
        await push(feedRef, {title, at:Date.now(), deviceId});
      }catch{
        toast("Aktion gespeichert, Feed nicht aktualisiert");
      }
    }

    async function change(kind){
      let label = "Aktion";
      let blocked = false;

      try{
        const result = await runTransaction(counterRef, (current) => {
          const s = cleanCounter(current || DEFAULT_COUNTER);

          if(kind === "maleIn") { s.maleIn += 1; label = "Männlich rein"; }
          if(kind === "femaleIn") { s.femaleIn += 1; label = "Weiblich rein"; }
          if(kind === "maleOut") {
            if(s.maleOut >= s.maleIn){ blocked = true; return s; }
            s.maleOut += 1; label = "Männlich raus";
          }
          if(kind === "femaleOut") {
            if(s.femaleOut >= s.femaleIn){ blocked = true; return s; }
            s.femaleOut += 1; label = "Weiblich raus";
          }

          if(blocked) return s;

          const c = compute(s);
          s.peak = Math.max(n(s.peak), c.totalCurrent);
          s.eventCount = n(s.eventCount) + 1;
          s.updatedAt = Date.now();
          s.lastAction = label;
          return s;
        });

        if(blocked){
          toast(kind === "maleOut" ? "Keine männlichen Besucher offen" : "Keine weiblichen Besucher offen");
          return;
        }

        if(result.committed){
          await addFeed(label);
        }
      }catch(error){
        console.error(error);
        toast("Firebase-Fehler");
      }
    }

    async function resetCounter(){
      if(!confirm("Wirklich alle Zähler zurücksetzen?")) return;
      try{
        await set(counterRef, {...DEFAULT_COUNTER, updatedAt:Date.now(), lastAction:"Zurückgesetzt"});
        await remove(feedRef);
        await push(feedRef, {title:"Zurückgesetzt", at:Date.now(), deviceId});
        toast("Zurückgesetzt");
      }catch(error){
        console.error(error);
        toast("Zurücksetzen fehlgeschlagen");
      }
    }

    function backup(){
      const c = compute(latestCounter);
      const backup = {
        exportedAt:new Date().toISOString(),
        counter:{...latestCounter, ...c}
      };
      navigator.clipboard.writeText(JSON.stringify(backup,null,2))
        .then(() => toast("Backup kopiert"))
        .catch(() => toast("Backup nicht kopiert"));
    }

    async function fullscreen(){
      try{
        if(document.fullscreenElement) await document.exitFullscreen();
        else await document.documentElement.requestFullscreen();
      }catch{
        toast("Vollbild nicht verfügbar");
      }
    }

    function bind(){
      $("btnMaleIn").onclick = () => change("maleIn");
      $("btnMaleOut").onclick = () => change("maleOut");
      $("btnFemaleIn").onclick = () => change("femaleIn");
      $("btnFemaleOut").onclick = () => change("femaleOut");
      $("refreshBtn").onclick = () => location.reload();
      $("backupBtn").onclick = backup;
      $("resetBtn").onclick = resetCounter;
      $("fullscreenBtn").onclick = fullscreen;
    }

    onValue(connectedRef, (snap) => {
      online = snap.val() === true;
      renderStatus();
    });

    onValue(counterRef, (snap) => {
      if(!snap.exists()){
        set(counterRef, DEFAULT_COUNTER);
        renderCounter(DEFAULT_COUNTER);
        return;
      }
      renderCounter(snap.val());
    });

    onValue(query(feedRef, limitToLast(12)), (snap) => {
      const items = [];
      snap.forEach(child => items.push(child.val()));
      items.sort((a,b) => n(a.at) - n(b.at));
      renderFeed(items);
    });

    bind();
    renderCounter(DEFAULT_COUNTER);
    renderStatus();
  </script>
</body>
</html>
